<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Yossa | Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-900 text-white font-sans">
    <header class="bg-gray-900/70 backdrop-blur-lg fixed top-0 left-0 right-0 z-10">
        <div class="container mx-auto px-4">
            <nav class="flex items-center justify-between h-20" role="navigation" aria-label="Main">
                <button id="lang-toggle" class="bg-gray-800 text-indigo-400 py-2 px-4 rounded-full text-sm font-semibold focus:outline-none" aria-label="Toggle language between English and French">
                    Français / English
                </button>
                <a href="index.html" class="text-2xl font-bold ml-4">JY</a>
                <ul class="hidden md:flex space-x-8 ml-auto">
                    <li><a href="index.html#about" class="hover:text-indigo-400 transition-colors" data-lang-en="About" data-lang-fr="À propos">About</a></li>
                    <li><a href="blog.html" class="hover:text-indigo-400 transition-colors" data-lang-en="Insights" data-lang-fr="Réflexions">Insights</a></li>
                    <li><a href="art-ai.html" class="hover:text-indigo-400 transition-colors" data-lang-en="Art & AI" data-lang-fr="Art & IA">Art & AI</a></li>
                    <li><a href="index.html#contact" class="hover:text-indigo-400 transition-colors" data-lang-en="Contact" data-lang-fr="Contact">Contact</a></li>
                </ul>
                <div class="md:hidden ml-auto">
                    <button id="mobile-menu-button" class="text-white focus:outline-none" aria-label="Open main menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-4 6h16"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
        <div id="mobile-menu" class="hidden md:hidden">
            <ul class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <li><a href="index.html#about" class="block py-2 px-3 text-base font-medium text-gray-300 rounded-md hover:text-white hover:bg-gray-700" data-lang-en="About" data-lang-fr="À propos">About</a></li>
                <li><a href="blog.html" class="block py-2 px-3 text-base font-medium text-gray-300 rounded-md hover:text-white hover:bg-gray-700" data-lang-en="Insights" data-lang-fr="Réflexions">Insights</a></li>
                <li><a href="art-ai.html" class="block py-2 px-3 text-base font-medium text-gray-300 rounded-md hover:text-white hover:bg-gray-700" data-lang-en="Art & AI" data-lang-fr="Art & IA">Art & AI</a></li>
                <li><a href="index.html#contact" class="block py-2 px-3 text-base font-medium text-gray-300 rounded-md hover:text-white hover:bg-gray-700" data-lang-en="Contact" data-lang-fr="Contact">Contact</a></li>
            </ul>
        </div>
    </header>

    <main class="pt-20">
        <section id="blog" class="py-20">
            <div class="container mx-auto px-4">
                <h2 class="text-4xl font-bold text-center mb-12" data-lang-en="Insights" data-lang-fr="Réflexions">Insights</h2>
                <div id="blog-posts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Blog posts will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 py-6">
        <div class="container mx-auto px-4 text-center text-gray-400">
            <p>Built with 💜 by Julia Yossa</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
